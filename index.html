<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cinzas da Sanidade - Jogo</title>
  <style>
    body { 
      margin:0; 
      overflow:hidden; 
      background:#0a0a05; 
      font-family: 'Courier New', monospace; 
      color: #ddd;
    }
    
    #intro {
      position: absolute; 
      top: 0; left: 0; 
      width: 100%; height: 100%;
      background: #111; 
      display: flex; 
      align-items: center; 
      justify-content: center;
      flex-direction: column; 
      z-index: 100; 
      padding: 40px;
      text-align: center;
    }

    #intro-text {
      max-width: 720px;
      line-height: 1.8;
      font-size: 1.35rem;
      min-height: 280px;
    }

    #game { display: none; }

    canvas { 
      image-rendering: pixelated; 
      border: 4px solid #222; 
      display: block; 
      margin: 0 auto;
    }

    #life-container {
      position: absolute;
      top: 25px;
      left: 25px;
      z-index: 10;
      font-size: 2.2rem;
      transition: transform 0.4s;
    }
  </style>
</head>
<body>

  <!-- INTRODUÇÃO -->
  <div id="intro">
    <h2 style="color:#f66; margin-bottom:40px;">Capítulo 1 - As Cinzas</h2>
    <div id="intro-text"></div>
    
    <button onclick="skipIntro()" style="margin-top:40px; padding:12px 40px; font-size:1.2rem; background:#300; border:2px solid #f44; color:white; cursor:pointer;">
      PULAR
    </button>
  </div>

  <!-- JOGO -->
  <div id="game">
    <div id="life-container">❤️</div>
    <canvas id="canvas" width="800" height="600"></canvas>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    let playerX = 400, playerY = 300;
    let gameRunning = false;
    let heartPulse = 1;

    // ==================== TEXTO DA INTRO ====================
    const introText = `O mundo acabou não com fogo ou água, mas com silêncio.

Você caminha por florestas mortas, céus cinzentos de fuligem e terra rachada.

Sua lanterna é a única luz que resta.

Quanto mais você avança nas áreas devastadas, mais os monstros da sua mente ganham forma...`;

    let currentText = "";
    let textIndex = 0;
    const typingSpeed = 35; // velocidade (quanto menor, mais rápido)

    function typeWriter() {
      if (textIndex < introText.length) {
        currentText += introText.charAt(textIndex);
        document.getElementById('intro-text').innerHTML = currentText.replace(/\n/g, '<br>');
        textIndex++;
        setTimeout(typeWriter, typingSpeed);
      } else {
        // Quando terminar de digitar, inicia o jogo automaticamente
        setTimeout(() => {
          startActualGame();
        }, 1500);
      }
    }

    // ==================== INICIAR JOGO ====================
    function startActualGame() {
      document.getElementById('intro').style.display = 'none';
      document.getElementById('game').style.display = 'block';
      gameRunning = true;
      initGame();
    }

    function skipIntro() {
      startActualGame();
    }

    function initGame() {
      setInterval(gameLoop, 1000/60);
      pulseHeart();
    }

    // Pulsação do coração (vida)
    function pulseHeart() {
      const heart = document.getElementById('life-container');
      setInterval(() => {
        heart.style.transform = `scale(${heartPulse})`;
        heartPulse = heartPulse === 1 ? 1.25 : 1;
      }, 800);
    }

    // Loop principal do jogo
    function gameLoop() {
      if (!gameRunning) return;

      // Movimento
      if (keys['w'] || keys['W']) playerY -= 4;
      if (keys['s'] || keys['S']) playerY += 4;
      if (keys['a'] || keys['A']) playerX -= 4;
      if (keys['d'] || keys['D']) playerX += 4;

      draw();
    }

    function draw() {
      // Fundo
      ctx.fillStyle = '#1a1a10';
      ctx.fillRect(0, 0, 800, 600);

      // Terra devastada
      ctx.fillStyle = '#2a2a15';
      ctx.fillRect(0, 0, 800, 600);

      // Árvores/obstáculos
      ctx.fillStyle = '#0a0a05';
      ctx.fillRect(120, 80, 45, 95);
      ctx.fillRect(580, 180, 40, 110);
      ctx.fillRect(280, 420, 55, 85);

      // Jogador (pixel)
      ctx.fillStyle = '#ffcc88';
      ctx.fillRect(playerX, playerY, 18, 26);        // corpo
      ctx.fillStyle = '#aa6644';
      ctx.fillRect(playerX+4, playerY-8, 11, 11);   // cabeça

      // Brilho da lanterna
      ctx.fillStyle = 'rgba(255, 160, 40, 0.35)';
      ctx.fillRect(playerX-30, playerY-25, 65, 65);
    }

    // Controles
    const keys = {};
    window.addEventListener('keydown', e => keys[e.key] = true);
    window.addEventListener('keyup', e => keys[e.key] = false);

    // Inicia o efeito de digitação automaticamente
    window.onload = () => {
      typeWriter();
    };
  </script>
</body>
</html>
